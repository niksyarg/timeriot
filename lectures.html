<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeRiot | ლექციები</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+GO:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff4d4d; --bg: #0d0d0d; --card: #1a1a1a; --gold: #ffd700; --text: #ffffff; }
        body.soft-mode { --bg: #121210; --card: #1c1c18; --text: #e0dcd0; --red: #e65c5c; }
        body { font-family: 'Fira GO', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.3s; }
        
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: var(--card); border-bottom: 2px solid #333; }
        .logo { font-size: 24px; font-weight: bold; color: var(--text); text-decoration: none; }
        .logo span { color: var(--red); }
        
        .container { display: flex; max-width: 1200px; margin: 30px auto; gap: 30px; padding: 0 20px; flex-wrap: wrap; }
        .sidebar { width: 300px; }
        .main-content { flex: 1; min-width: 300px; background: var(--card); border-radius: 20px; padding: 40px; border: 1px solid #333; position: relative; }

        /* --- 1. Слайдер Времени (Before/After) --- */
        .comparison-slider { position: relative; width: 100%; height: 400px; overflow: hidden; border-radius: 15px; margin: 20px 0; border: 2px solid #333; }
        .comparison-slider img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        .comparison-slider .img-after { width: 50%; border-right: 3px solid var(--red); z-index: 2; }
        .slider-handle { position: absolute; top: 0; bottom: 0; left: 50%; width: 4px; background: var(--red); z-index: 3; cursor: ew-resize; transform: translateX(-50%); }

        /* --- 2. Раскопки (Scratch Off) --- */
        .dig-container { position: relative; width: 100%; max-width: 500px; height: 300px; margin: 25px auto; border-radius: 15px; overflow: hidden; border: 3px dashed #555; cursor: crosshair; }
        .dig-artifact { width: 100%; height: 100%; object-fit: contain; background: #000; }
        .dig-canvas { position: absolute; top: 0; left: 0; z-index: 5; }

        /* Анимации и маркеры (из твоего кода) */
        @keyframes pulse-red { 0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.7); } 70% { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 0 10px rgba(255, 77, 77, 0); } 100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 0 0 rgba(255, 77, 77, 0); } }
        .map-marker { position: absolute; width: 12px; height: 12px; background: var(--red); border: 2px solid white; border-radius: 50%; animation: pulse-red 2s infinite; transform: translate(-50%, -50%); }
        .gold-card { background: rgba(255, 215, 0, 0.05); border: 2px solid var(--gold); padding: 20px; border-radius: 15px; margin: 30px 0; text-align: center; }
        
        /* Стандартные блоки */
        .lecture-card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 15px; cursor: pointer; transition: 0.3s; }
        .lecture-card.active { border-left: 5px solid var(--red); background: #252525; }
        .test-box { margin-top: 40px; padding: 30px; background: #111; border-radius: 15px; border-top: 3px solid var(--red); }
        .btn-check { background: var(--red); color: white; border: none; padding: 12px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-family: 'Fira GO'; }
    </style>
</head>
<body>

<div class="navbar">
    <a href="index.html" class="logo">Time<span>Riot</span></a>
</div>

<div class="container">
    <div class="sidebar">
        <div class="lecture-card active" onclick="loadLecture(1)"><h4>1. ქვისა და ბრინჯაოს ხანა</h4></div>
        <div class="lecture-card" onclick="loadLecture(2)"><h4>2. შუმერი და ბაბილონი</h4></div>
    </div>

    <div class="main-content">
        <div id="display"></div>
    </div>
</div>

<script>
    const data = {
        1: {
            title: "ქვისა და ბრიнჯაოს ხანა",
            content: "აღმოაჩინე ისტორია საკუთარი ხელით. ქვემოთ მოცემულია არქეოლოგიური ფენა, წაშალე მტვერი და იპოვე არტეფაქტი!",
            digImage: "https://i.imgur.com/8Y4e3pD.png", // Сюда вставь фото черепа Мзии/Зезвы
            mapPoints: [{ x: '55%', y: '45%', title: 'დმანისი' }],
            goldFact: "დმანისის აღმოჩენა ცვლის მსოფლიო ისტორიას!",
            test: []
        },
        2: {
            title: "შუმერი და ბაბილონი",
            content: "ნახე როგორ გამოიყურება ბაბილონი დღეს და როგორი იყო ის ხამურაბის დროს. გამოიყენე სლაიდერი შედარებისთვის.",
            slider: {
                before: "https://i.imgur.com/xO4X9Q3.jpg", // Фото руин сегодня
                after: "https://i.imgur.com/vHqY7R7.jpg"   // 3D Реконструкция
            },
            mapPoints: [{ x: '60%', y: '70%', title: 'ბაბილონი' }],
            goldFact: "ბაბილონი იყო თავისი დროის ნიუ-იორკი!",
            test: []
        }
    };

    function loadLecture(id) {
        const lecture = data[id];
        const display = document.getElementById('display');
        
        let html = `<h1>${lecture.title}</h1><p>${lecture.content}</p>`;

        // Добавляем Раскопки, если они есть
        if (lecture.digImage) {
            html += `
                <h4 style="color:var(--gold)">⛏️ არქეოლოგიური გათხრები:</h4>
                <div class="dig-container" id="digZone">
                    <img src="${lecture.digImage}" class="dig-artifact">
                    <canvas id="digCanvas" class="dig-canvas"></canvas>
                </div>
            `;
        }

        // Добавляем Слайдер, если он есть
        if (lecture.slider) {
            html += `
                <h4 style="color:var(--gold)">↔️ ბაბილონი: მაშინ და ახლა:</h4>
                <div class="comparison-slider" onmousemove="moveSlider(event)">
                    <img src="${lecture.slider.before}">
                    <div class="img-after" id="afterImg" style="background-image: url('${lecture.slider.after}'); background-size: cover;"></div>
                    <div class="slider-handle" id="handle"></div>
                </div>
            `;
        }

        html += `<div class="gold-card"><h3>🏆 მთავარი ფაქტი</h3><p>${lecture.goldFact}</p></div>`;
        display.innerHTML = html;

        if (lecture.digImage) initScratch();
    }

    // Логика Слайдера
    function moveSlider(e) {
        const slider = e.currentTarget;
        const afterImg = slider.querySelector('.img-after');
        const handle = slider.querySelector('.slider-handle');
        const rect = slider.getBoundingClientRect();
        let x = e.pageX - rect.left;
        if (x < 0) x = 0;
        if (x > rect.width) x = rect.width;
        
        afterImg.style.width = x + "px";
        handle.style.left = x + "px";
    }

    // Логика Раскопок
    function initScratch() {
        const canvas = document.getElementById('digCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('digZone');
        
        canvas.width = container.offsetWidth;
        canvas.height = container.offsetHeight;

        // Слой "земли"
        ctx.fillStyle = "#5c4033"; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Текст на песке
        ctx.fillStyle = "#ffffff";
        ctx.font = "20px Fira GO";
        ctx.textAlign = "center";
        ctx.fillText("გათხარე აქ", canvas.width/2, canvas.height/2);

        function scratch(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;
            
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, 30, 0, Math.PI * 2);
            ctx.fill();
        }

        canvas.addEventListener('mousemove', scratch);
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e); });
    }

    loadLecture(1);
</script>
</body>
</html>
