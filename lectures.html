<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeRiot | ლექციები</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+GO:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff4d4d; --bg: #0d0d0d; --card: #1a1a1a; }
        body { font-family: 'Fira GO', sans-serif; background: var(--bg); color: white; margin: 0; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: var(--card); border-bottom: 2px solid #333; }
        .logo { font-size: 24px; font-weight: bold; color: white; text-decoration: none; }
        .logo span { color: var(--red); }
        
        /* Стили для Цитаты */
        .quote-box { background: linear-gradient(90deg, #1a1a1a, #252525); border-left: 4px solid var(--red); padding: 20px; margin-bottom: 30px; border-radius: 8px; font-style: italic; color: #aaa; position: relative; }
        .quote-box span { color: var(--red); font-weight: bold; display: block; margin-top: 10px; font-style: normal; }

        .container { display: flex; max-width: 1200px; margin: 30px auto; gap: 30px; padding: 0 20px; flex-wrap: wrap; }
        .sidebar { width: 300px; }
        .lecture-card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 15px; cursor: pointer; transition: 0.3s; position: relative; }
        .lecture-card.locked::after { content: '🔒'; position: absolute; right: 15px; top: 25px; opacity: 0.5; }
        .lecture-card.active { border-left: 5px solid var(--red); background: #252525; }
        
        .main-content { flex: 1; min-width: 300px; background: var(--card); border-radius: 20px; padding: 40px; border: 1px solid #333; min-height: 500px; }
        .btn-download { display: inline-block; color: var(--red); border: 2px solid var(--red); padding: 12px 20px; text-decoration: none; border-radius: 8px; font-weight: bold; margin: 20px 0; }
        
        /* Кнопка WhatsApp */
        .btn-whatsapp { display: flex; align-items: center; justify-content: center; gap: 10px; background: #25D366; color: white; text-decoration: none; padding: 15px; border-radius: 8px; font-weight: bold; margin-top: 20px; transition: 0.3s; }
        .btn-whatsapp:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3); }

        .test-box { margin-top: 40px; padding: 30px; background: #111; border-radius: 15px; border-top: 3px solid var(--red); }
        .btn-check { background: var(--red); color: white; border: none; padding: 12px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; }
        .result-msg { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; text-align: center; font-weight: bold; }
        
        .lock-screen { text-align: center; padding: 50px 20px; }
        .lock-screen input { background: #000; border: 2px solid var(--red); color: white; padding: 12px; border-radius: 8px; font-size: 20px; text-align: center; margin-bottom: 15px; outline: none; }
    </style>
</head>
<body>

<div class="navbar">
    <a href="index.html" class="logo">Time<span>Riot</span></a>
</div>

<div class="container">
    <div class="sidebar">
        <div class="lecture-card active" id="card1" onclick="loadLecture(1)">
            <h4>1. ქვისა და ბრინჯაოს ხანა</h4>
            <p>დმანისის აღმოჩენები</p>
        </div>
        <div class="lecture-card locked" id="card2" onclick="loadLecture(2)">
            <h4>2. შუმერი და ბაბილონი</h4>
            <p>მესოპოტამიის ისტორია</p>
        </div>
    </div>

    <div class="main-content">
        <div class="quote-box" id="quote-display">
            "ისტორია არის ფილოსოფია მაგალითებით."
            <span>- თუკიდიდე</span>
        </div>

        <div id="display"></div>
    </div>
</div>

<script>
    let isUnlocked = false;
    let currentLectureId = 1;

    // Массив цитат
    const quotes = [
        { t: "ისტორია არის ფილოსოფია მაგალითებით.", a: "თუკიდიდე" },
        { t: "შეუძლებელი არის სიტყვა, რომელიც მხოლოდ სულელების ლექსიკონში მოიპოვება.", a: "ნაპოლეონ ბონაპარტი" },
        { t: "ხალხი, რომელმაც არ იცის თავისი წარსული, განწირულია მისი განმეორებისთვის.", a: "ჯორჯ სანტაიანა" },
        { t: "მე მოვედი, მე ვნახე, მე გავიმარჯვე.", a: "იულიუს კეისარი" }
    ];

    const data = {
        1: {
            title: "ქვისა და ბრინჯაოს ხანა",
            content: "საქართველოს ტერიტორიაზე ადამიანის ცხოვრების კვალი უძველესი დროიდან დასტურდება. დმანისში აღმოჩენილი ჰომინიდების ნაშთები (მზია და ზეზვა) 1.8 მილიონი წლით თარიღდება.",
            file: "lecture1.docx",
            test: [
                { q: "რამდენი წლისაა დმანისის ნაშთები?", a: ["1.5 მლნ", "1.8 მლნ", "2.1 მლნ"], c: 1 },
                { q: "რა ეწოდება პერიოდს, როცა ადამიანი იყენებდა ქვას?", a: ["ქვის ხანა", "რკინის ხანა", "ოქროს ხანა"], c: 0 },
                { q: "ვინ არიან მზია და ზეზვა?", a: ["მეფეები", "ჰომინიდები", "მწერლები"], c: 1 }
            ]
        },
        2: {
            title: "შუმერი და ბაბილონი",
            content: "მესოპოტამიაში შუმერებმა შექმნეს პირველი ლურსმული დამწერლობა. ბაბილონის მეფე ხამურაბიმ შექმნა 282 მუხლისგან შემდგარი კანონთა კრებული.",
            file: "lecture2.docx",
            test: [
                { q: "რა ეწოდება შუმერულ დამწერლობას?", a: ["იეროგლიფები", "ლურსმული", "ანბანი"], c: 1 },
                { q: "რამდენი მუხლია ხამურაბის კანონებში?", a: ["100", "282", "300"], c: 1 },
                { q: "ვინ გამოიგონა ბორბალი?", a: ["ეგვიპტელებმა", "შუმერებმა", "ბერძნებმა"], c: 1 }
            ]
        }
    };

    function updateQuote() {
        const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
        document.getElementById('quote-display').innerHTML = `"${randomQuote.t}" <span>- ${randomQuote.a}</span>`;
    }

    function loadLecture(id) {
        currentLectureId = id;
        updateQuote();
        const display = document.getElementById('display');
        document.querySelectorAll('.lecture-card').forEach(c => c.classList.remove('active'));
        document.getElementById('card' + id).classList.add('active');

        if (id === 2 && !isUnlocked) {
            display.innerHTML = `
                <div class="lock-screen">
                    <h2 style="color:var(--red)">🔒 ლექცია დაბლოკილია</h2>
                    <p>შეიყვანეთ პაროლი წვდომისთვის:</p>
                    <input type="text" id="pass-input" placeholder="პაროლი">
                    <br>
                    <button class="btn-check" style="width:200px" onclick="checkPass()">გახსნა</button>
                </div>`;
        } else {
            const lecture = data[id];
            display.innerHTML = `
                <h1 style="color:var(--red)">${lecture.title}</h1>
                <p>${lecture.content}</p>
                <a href="${lecture.file}" class="btn-download" download>📥 ჩამოტვირთე მასალა (Word)</a>
                <div class="test-box">
                    <h3>📝 ტესტი</h3>
                    ${lecture.test.map((t, i) => `
                        <div style="margin-bottom:20px;">
                            <p><b>${i+1}. ${t.q}</b></p>
                            ${t.a.map((ans, ai) => `<label style="display:block; margin-bottom:5px;"><input type="radio" name="q${i}" value="${ai}"> ${ans}</label>`).join('')}
                        </div>
                    `).join('')}
                    <button class="btn-check" onclick="checkTest()">შემოწმება</button>
                    <div id="result" class="result-msg"></div>
                    
                    <a href="https://wa.me/995558551052?text=გამარჯობა, მაქვს კითხვა ლექციასთან დაკავშირებით: ${lecture.title}" target="_blank" class="btn-whatsapp">
                        💬 გაქვს კითხვა? მოგვწერე WhatsApp-ში
                    </a>
                </div>`;
        }
    }

    function checkPass() {
        const val = document.getElementById('pass-input').value;
        if (val === "RIOT1828") {
            isUnlocked = true;
            document.getElementById('card2').classList.remove('locked');
            loadLecture(2);
        } else { alert("არასწორი პაროლი!"); }
    }

    function checkTest() {
        const lecture = data[currentLectureId];
        let score = 0;
        lecture.test.forEach((t, i) => {
            const sel = document.querySelector(`input[name="q${i}"]:checked`);
            if (sel && parseInt(sel.value) === t.c) score++;
        });

        const res = document.getElementById('result');
        res.style.display = "block";
        if (score === 3) {
            res.innerHTML = "ბრწყინვალეა! 3-დან 3 სწორია. შენ ნამდვილი ისტორიკოსი ხარ! 🌟";
            res.style.background = "rgba(46, 204, 113, 0.2)"; res.style.color = "#2ecc71";
        } else {
            res.innerHTML = `შედეგი: 3-დან ${score} სწორია. სცადე თავიდან უკეთესი შედეგისთვის!`;
            res.style.background = "rgba(241, 196, 15, 0.2)"; res.style.color = "#f1c40f";
        }
    }

    loadLecture(1);
</script>
</body>
</html>
