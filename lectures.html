<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeRiot | ლექციები</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+GO:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff4d4d; --bg: #0d0d0d; --card: #1a1a1a; }
        body { font-family: 'Fira GO', sans-serif; background: var(--bg); color: white; margin: 0; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: var(--card); border-bottom: 2px solid #333; }
        .logo { font-size: 24px; font-weight: bold; color: white; text-decoration: none; }
        .logo span { color: var(--red); }
        
        .container { display: flex; max-width: 1200px; margin: 30px auto; gap: 30px; padding: 0 20px; flex-wrap: wrap; }
        .sidebar { width: 300px; }
        .lecture-card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 15px; cursor: pointer; transition: 0.3s; position: relative; }
        .lecture-card.locked::after { content: '🔒'; position: absolute; right: 15px; top: 25px; opacity: 0.5; }
        .lecture-card.active { border-left: 5px solid var(--red); background: #252525; }
        
        /* Стили плеера */
        .music-player { background: #1a1a1a; border: 1px solid #333; padding: 15px; border-radius: 12px; margin-top: 20px; text-align: center; }
        .music-btn { background: none; border: 2px solid #ff4d4d; color: #ff4d4d; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        .music-btn:hover { background: #ff4d4d; color: white; }
        .music-btn.playing { background: #ff4d4d; color: white; animation: pulse 2s infinite; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(255, 77, 77, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0); } }

        .dictionary-btn { background: #333; color: #ff4d4d; border: 1px dashed #ff4d4d; text-align: center; padding: 15px; border-radius: 12px; cursor: pointer; margin-top: 20px; font-weight: bold; }
        .main-content { flex: 1; min-width: 300px; background: var(--card); border-radius: 20px; padding: 40px; border: 1px solid #333; min-height: 500px; }
        .btn-download { display: inline-block; color: var(--red); border: 2px solid var(--red); padding: 12px 20px; text-decoration: none; border-radius: 8px; font-weight: bold; margin: 20px 0; }
        .test-box { margin-top: 40px; padding: 30px; background: #111; border-radius: 15px; border-top: 3px solid var(--red); }
        .btn-check { background: var(--red); color: white; border: none; padding: 12px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; }
        .result-msg { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="navbar">
    <a href="index.html" class="logo">Time<span>Riot</span></a>
</div>

<div class="container">
    <div class="sidebar">
        <div class="music-player">
            <span style="font-size: 14px; color: #888;">🎧 ფონი მეცადინეობისთვის</span>
            <button id="music-btn" class="music-btn" onclick="toggleMusic()">ჩართვა</button>
            <audio id="bg-music" loop>
                <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
            </audio>
        </div>

        <div class="lecture-card active" id="card1" onclick="loadLecture(1)">
            <h4>1. ქვისა და ბრინჯაოს ხანა</h4>
            <p>დმანისის აღმოჩენები</p>
        </div>
        <div class="lecture-card locked" id="card2" onclick="loadLecture(2)">
            <h4>2. შუმერი და ბაბილონი</h4>
            <p>მესოპოტამიის ისტორია</p>
        </div>
        
        <div class="dictionary-btn" onclick="showDictionary()">📜 ტერმინოლოგია</div>
    </div>

    <div class="main-content">
        <div id="display"></div>
    </div>
</div>

<script>
    let isUnlocked = false;
    let isPlaying = false;

    function toggleMusic() {
        const music = document.getElementById('bg-music');
        const btn = document.getElementById('music-btn');
        if (!isPlaying) {
            music.play();
            btn.innerText = "გამორთვა";
            btn.classList.add('playing');
        } else {
            music.pause();
            btn.innerText = "ჩართვა";
            btn.classList.remove('playing');
        }
        isPlaying = !isPlaying;
    }

    // Все старые функции (loadLecture, checkPass, и т.д.) остаются здесь без изменений
    const dictionary = [
        { term: "ჰომინიდები", desc: "ადამიანის მსგავსი არსებები..." },
        { term: "ლურსმული დამწერლობა", desc: "შუმერების მიერ შექმნილი დამწერლობა..." }
    ];

    const data = {
        1: {
            title: "ქვისა და ბრინჯაოს ხანა",
            content: "საქართველოს ტერიტორიაზე ადამიანის ცხოვრების კვალი უძველესი დროიდან დასტურდება...",
            file: "lecture1.docx",
            test: [
                { q: "რამდენი წლისაა დმანისის ნაშთები?", a: ["1.5 მლნ", "1.8 მლნ", "2.1 მლნ"], c: 1 },
                { q: "რა ეწოდება პერიოდს?", a: ["ქვის ხანა", "რკინის ხანა"], c: 0 },
                { q: "ვინ არიან მზია და ზეზვა?", a: ["მეფეები", "ჰომინიდები"], c: 1 }
            ]
        },
        2: {
            title: "შუმერი და ბაბილონი",
            content: "მესოპოტამიაში შუმერებმა შექმნეს პირველი ლურსმული დამწერლობა...",
            file: "lecture2.docx",
            test: [
                { q: "რა ეწოდება შუმერულ დამწერლობას?", a: ["იეროგლიფები", "ლურსმული"], c: 1 },
                { q: "რამდენი მუხლია?", a: ["100", "282"], c: 1 },
                { q: "ვინ გამოიგონა ბორბალი?", a: ["ეგვიპტელებმა", "შუმერებმა"], c: 1 }
            ]
        }
    };

    function showDictionary() {
        const display = document.getElementById('display');
        display.innerHTML = `<h1 style="color:var(--red)">📜 ტერმინოლოგია</h1>` + 
            dictionary.map(item => `<div style="background:#222; padding:15px; margin-bottom:10px; border-radius:8px;"><b>${item.term}</b>: ${item.desc}</div>`).join('');
    }

    function loadLecture(id) {
        const display = document.getElementById('display');
        if (id === 2 && !isUnlocked) {
            display.innerHTML = `<div style="text-align:center; padding:50px;"><h2>🔒 ლექცია დაბლოკილია</h2><input type="text" id="pass-input" placeholder="პაროლი" style="padding:10px; border-radius:5px; border:none; margin-bottom:10px;"><br><button class="music-btn" onclick="checkPass()">გახსნა</button></div>`;
        } else {
            const lecture = data[id];
            display.innerHTML = `<h1 style="color:var(--red)">${lecture.title}</h1><p>${lecture.content}</p><a href="${lecture.file}" class="btn-download" download>📥 ჩამოტვირთვა</a><div class="test-box"><h3>📝 ტესტი</h3>${lecture.test.map((t, i) => `<p><b>${t.q}</b></p>${t.a.map((ans, ai) => `<label style="display:block;"><input type="radio" name="q${i}" value="${ai}"> ${ans}</label>`).join('')}`).join('')}<button class="btn-check" onclick="checkTest(${id})">შემოწმება</button><div id="result" class="result-msg"></div></div>`;
        }
    }

    function checkPass() { if (document.getElementById('pass-input').value === "RIOT1828") { isUnlocked = true; loadLecture(2); } else { alert("არასწორია!"); } }

    function checkTest(id) {
        let score = 0;
        data[id].test.forEach((t, i) => {
            const sel = document.querySelector(`input[name="q${i}"]:checked`);
            if (sel && parseInt(sel.value) === t.c) score++;
        });
        const res = document.getElementById('result');
        res.style.display = "block";
        res.innerHTML = score === 3 ? "ბრწყინვალეა! 3/3" : `შედეგი: ${score}/3`;
        res.style.color = score === 3 ? "#2ecc71" : "#f1c40f";
    }

    loadLecture(1);
</script>
</body>
</html>
