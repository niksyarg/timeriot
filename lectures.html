<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeRiot | Student Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+GO:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff4d4d; --bg: #0d0d0d; --card: #1a1a1a; --gold: #ffd700; --text: #ffffff; --green: #2ecc71; }
        body.soft-mode { --bg: #0a0a09; --card: #141412; --text: #d1cdc0; --red: #ff5e5e; }
        body { font-family: 'Fira GO', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.3s; overflow-x: hidden; }
        
        /* Auth Screen */
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--card); padding: 40px; border-radius: 25px; border: 2px solid var(--gold); text-align: center; width: 300px; }
        
        .master-progress { position: fixed; top: 0; left: 0; width: 100%; height: 6px; background: #222; z-index: 2000; }
        #masterProgressBar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--red), var(--gold)); transition: 1s; box-shadow: 0 0 10px var(--gold); }

        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: var(--card); border-bottom: 2px solid #333; margin-top: 6px; }
        .logo { font-size: 24px; font-weight: bold; color: var(--text); text-decoration: none; }
        .logo span { color: var(--red); }
        
        .container { display: flex; max-width: 1200px; margin: 30px auto; gap: 30px; padding: 0 20px; flex-wrap: wrap; }
        .sidebar { width: 300px; }
        .sidebar-box { background: var(--card); border: 1px solid #333; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        
        .lecture-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 10px; cursor: pointer; transition: 0.3s; position: relative; }
        .lecture-card.completed { border-left: 5px solid var(--green); }
        .lecture-card.active { border-left: 5px solid var(--red); background: #252525; }

        .main-content { flex: 1; min-width: 300px; background: var(--card); border-radius: 20px; padding: 40px; border: 1px solid #333; position: relative; }

        .btn-action { background: none; border: 2px solid var(--red); color: var(--red); padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; font-family: 'Fira GO'; }
        .btn-action:hover { background: var(--red); color: white; }
        
        .test-box { margin-top: 40px; padding: 30px; background: #111; border-radius: 15px; border-top: 3px solid var(--red); }
        .input-riot { background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 10px; width: 100%; margin-bottom: 15px; box-sizing: border-box; }
        
        .term-link { color: var(--gold); border-bottom: 1px dotted var(--gold); cursor: pointer; font-weight: bold; }
        .glossary-card { background: #000; border-left: 4px solid var(--gold); padding: 15px; margin: 15px 0; display: none; }
    </style>
</head>
<body onload="initApp()">

<div id="auth-overlay">
    <div class="auth-card">
        <h2 style="color:var(--gold);">Time<span>Riot</span> Вход</h2>
        <input type="text" id="userNameInput" class="input-riot" placeholder="Ваше имя">
        <input type="password" id="userAccessKey" class="input-riot" placeholder="Код доступа">
        <button class="btn-action" onclick="login()">Войти в систему</button>
        <p style="font-size: 10px; color: #666; margin-top: 15px;">Введите RIOT-ADMIN для режима учителя</p>
    </div>
</div>

<div class="master-progress"><div id="masterProgressBar"></div></div>

<div class="navbar">
    <a href="#" class="logo">Time<span>Riot</span></a>
    <div style="display:flex; gap:15px; align-items: center;">
        <div id="adminBadge" style="display:none; color:var(--red); font-weight:bold; font-size:12px; border:1px solid var(--red); padding:2px 8px; border-radius:10px;">ADMIN</div>
        <div class="rank-badge" id="userRank" style="background: rgba(255, 215, 0, 0.1); border: 1px solid var(--gold); color: var(--gold); padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold;">რანგი: ნეოფიტი</div>
        <button class="btn-action" onclick="toggleSoftMode()" style="width: auto; margin-top: 0; padding: 5px 10px;">🌙</button>
    </div>
</div>

<div class="container">
    <div class="sidebar">
        <div class="sidebar-box" style="border-color: var(--gold);">
            <h4 style="margin:0; color:var(--gold);">👤 კაბინეტი</h4>
            <p id="userNameDisplay" style="font-size:14px; margin:10px 0; font-weight:bold;"></p>
            <div id="globalStats">პროგრესი: 0/119</div>
        </div>

        <input type="text" id="lectureSearch" class="search-box" style="width:100%; padding:10px; margin-bottom:15px; background:#000; border:1px solid #333; color:#fff; border-radius:10px;" placeholder="ძებნა..." oninput="filterLectures()">
        
        <div id="lectureList" style="max-height: 400px; overflow-y: auto;"></div>
    </div>

    <div class="main-content">
        <div id="display"></div>
    </div>
</div>

<script>
    const ADMIN_KEY = "RIOT-ADMIN";
    const STUDENT_KEY = "RIOT-117-GOLD";

    const data = {
        1: {
            title: "ქვისა და ბრინჯაოს ხანა",
            desc: "დმანისი და პირველი ევროპელები",
            content: `საქართველოს ტერიტორია ადამიანის განსახლების ერთ-ერთი უძველესი კერაა. განსაკუთრებული მნიშვნელობა აქვს <span class="term-link" onclick="toggleTerm(0)">დმანისს</span>.`,
            test: [
                { q: "რამდენი წლისაა დმანისის ჰომინიდები?", a: ["1.2 მლნ", "1.5 მლნ", "1.8 მლნ"], c: 2 },
                { q: "რომელ ეპოქაში დაიწყო მიწათმოქმედება?", a: ["პალეოლითში", "ნეოლითში", "ბრინჯაოს ხანაში"], c: 1 },
                { q: "ვინ იყვნენ ზეზვა და მზია?", a: ["მეფეები", "მწერლები", "ჰომინიდები"], c: 2 }
            ]
        },
        2: {
            title: "შუმერი და ბაბილონი",
            desc: "მესოპოტამიის ცივილიზაცია",
            content: "შუმერებმა შექმნეს პირველი ლურსმული დამწერლობა.",
            test: [
                { q: "რა დამწერლობა შექმნეს შუმერებმა?", a: ["ანბანი", "ლურსმული", "იეროგლიფები"], c: 1 },
                { q: "ვინ იყო ბაბილონის უდიდესი კანონმდებელი?", a: ["ნაბუქოდონოსორი", "ხამურაბი", "გილგამაში"], c: 1 },
                { q: "რომელ მდინარეებს შორის იყო მესოპოტამია?", a: ["ნილოსი და იორდანე", "ტიგროსი და ევფრატი", "მტკვარი და რიონი"], c: 1 }
            ]
        }
    };

    let userProgress = JSON.parse(localStorage.getItem('timeriot_completed')) || [];

    function login() {
        const name = document.getElementById('userNameInput').value;
        const key = document.getElementById('userAccessKey').value;

        if (name.length < 2) { alert("Введите имя!"); return; }

        if (key === ADMIN_KEY) {
            localStorage.setItem('timeriot_user', name);
            localStorage.setItem('timeriot_role', 'admin');
            document.getElementById('auth-overlay').style.display = 'none';
            initApp();
        } else if (key === STUDENT_KEY) {
            localStorage.setItem('timeriot_user', name);
            localStorage.setItem('timeriot_role', 'student');
            document.getElementById('auth-overlay').style.display = 'none';
            initApp();
        } else {
            alert("Неверный код доступа!");
        }
    }

    function initApp() {
        const user = localStorage.getItem('timeriot_user');
        const role = localStorage.getItem('timeriot_role');
        if (!user) return;

        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('userNameDisplay').innerText = user;
        if (role === 'admin') document.getElementById('adminBadge').style.display = 'block';

        renderSidebar();
        loadLecture(1);
        updateMasterProgress();
    }

    function renderSidebar() {
        const list = document.getElementById('lectureList');
        list.innerHTML = '';
        for (let i = 1; i <= 119; i++) {
            const lecture = data[i] || { title: `ლექცია ${i}`, desc: "მალე..." };
            list.innerHTML += `<div class="lecture-card ${i == currentId ? 'active' : ''} ${userProgress.includes(i) ? 'completed' : ''}" onclick="loadLecture(${i})"><h4>${i}. ${lecture.title}</h4></div>`;
        }
    }

    function loadLecture(id) {
        currentId = id;
        const l = data[id];
        const display = document.getElementById('display');
        if (!l) { display.innerHTML = `<h1>ლექცია ${id}</h1><p>მასალა მზადდება...</p>`; return; }

        let html = `<h1>${l.title}</h1><p>${l.content}</p>`;
        html += `<div class="test-box"><h3>📝 ტესტი (3 კითხვა)</h3>${l.test.map((t, i) => `<div style="margin-bottom:20px;"><p><b>${i+1}. ${t.q}</b></p>${t.a.map((ans, ai) => `<label style="display:block; margin-bottom:5px;"><input type="radio" name="q${i}" value="${ai}"> ${ans}</label>`).join('')}</div>`).join('')}<button class="btn-action" onclick="checkTest(${id})">შედეგის ნახვა</button></div>`;
        
        display.innerHTML = html;
        renderSidebar();
    }

    function checkTest(id) {
        const l = data[id];
        let correctCount = 0;
        l.test.forEach((t, i) => {
            const sel = document.querySelector(`input[name="q${i}"]:checked`);
            if (sel && parseInt(sel.value) === t.c) correctCount++;
        });

        if (correctCount === 3) {
            if (!userProgress.includes(id)) {
                userProgress.push(id);
                localStorage.setItem('timeriot_completed', JSON.stringify(userProgress));
            }
            updateMasterProgress();
            renderSidebar();
            alert('ყოჩაღ! სამივე კითხვა სწორია. ლექცია დასრულებულია.');
        } else {
            alert(`თქვენ სწორად უპასუხეთ ${correctCount} კითხვას 3-დან. სცადეთ თავიდან!`);
        }
    }

    function updateMasterProgress() {
        const count = userProgress.length;
        document.getElementById('masterProgressBar').style.width = (count / 119 * 100) + '%';
        document.getElementById('globalStats').innerText = `პროგრესი: ${count}/119`;
    }

    function toggleSoftMode() { document.body.classList.toggle('soft-mode'); }
    function toggleTerm(id) { alert("Подсказка по термину скоро будет здесь!"); }
</script>
</body>
</html>
