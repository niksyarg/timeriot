<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>TimeRiot | ლექციები</title>
    <script>
        // Проверка: если не вошел — отправляем на логин
        if (localStorage.getItem('userLoggedIn') !== 'true') {
            window.location.href = "login.html";
        }
    </script>
    <style>
        body { font-family: sans-serif; background: #0d0d0d; color: white; text-align: center; padding: 20px; }
        .main-wrapper { display: flex; max-width: 1000px; margin: 0 auto; gap: 20px; }
        .sidebar { width: 300px; background: #1a1a1a; padding: 20px; border-radius: 15px; text-align: left; }
        .lecture-link { display: block; padding: 15px; margin-bottom: 10px; background: #262626; border-radius: 8px; cursor: pointer; text-decoration: none; color: white; }
        .content-area { flex: 1; background: #1a1a1a; padding: 30px; border-radius: 15px; text-align: left; }
        .btn-logout { background: #333; color: white; padding: 10px; border: none; cursor: pointer; border-radius: 5px; margin-top: 20px; }
    </style>
</head>
<body>

    <div style="display: flex; justify-content: space-between; max-width: 1000px; margin: 0 auto 20px auto;">
        <h2 style="color:#ff4d4d">TimeRiot Lectures</h2>
        <button class="btn-logout" onclick="logout()">გამოსვლა</button>
    </div>

    <div class="main-wrapper">
        <div class="sidebar">
            <div class="lecture-link" onclick="show(1)">1. ქვისა და ბრინჯაოს ხანა</div>
            <div class="lecture-link" onclick="show(2)">2. შუმერი და ბაბილონი</div>
        </div>
        <div class="content-area" id="content">
            <h3>აირჩიეთ ლექცია</h3>
        </div>
    </div>

    <script>
        function show(id) {
            const content = document.getElementById('content');
            if(id === 1) {
                content.innerHTML = "<h3>ქვის ხანა</h3><p>აქ იქნება ტექსტი...</p>";
            } else {
                content.innerHTML = "<h3>ბაბილონი</h3><p>აქ იქნება ტექსტი...</p>";
            }
        }

        function logout() {
            localStorage.removeItem('userLoggedIn');
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
