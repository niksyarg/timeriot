<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeRiot | ლექციები</title>
    <style>
        body { font-family: 'Fira GO', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; background: #0d0d0d; color: white; padding: 20px; }
        .btn-home { padding: 10px 20px; background: #ff4d4d; color: white; text-decoration: none; border-radius: 8px; margin-bottom: 20px; font-weight: bold; }
        .main-wrapper { display: flex; width: 100%; max-width: 1100px; gap: 20px; }
        .sidebar { width: 300px; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .lecture-link { display: block; padding: 15px; margin-bottom: 10px; background: #262626; border-radius: 8px; cursor: pointer; color: #ccc; font-weight: bold; text-align: left; transition: 0.3s; position: relative; }
        .lecture-link.locked::after { content: '🔒'; position: absolute; right: 10px; }
        .lecture-link.active { background: #ff4d4d; color: white; }
        .content-area { flex: 1; background: #1a1a1a; padding: 35px; border-radius: 15px; border: 1px solid #333; min-height: 600px; }
        
        .lock-screen { text-align: center; padding: 60px 20px; }
        .lock-screen input { padding: 12px; border-radius: 8px; border: 1px solid #ff4d4d; background: #000; color: white; width: 220px; text-align: center; font-size: 18px; text-transform: uppercase; }
        .lock-screen button { padding: 12px 30px; background: #ff4d4d; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 15px; }
        
        .download-btn { display: inline-block; color: #ff4d4d; border: 2px solid #ff4d4d; padding: 12px 20px; border-radius: 8px; text-decoration: none; margin: 25px 0; font-weight: bold; }
        .test-section { border-top: 1px solid #333; margin-top: 30px; padding-top: 25px; }
        .option-label { display: block; padding: 12px; background: #262626; border-radius: 8px; margin-bottom: 10px; cursor: pointer; }
        .check-btn { width: 100%; padding: 18px; background: #27ae60; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        #result-box { margin-top: 20px; padding: 20px; display: none; border-radius: 10px; text-align: center; font-weight: bold; }
        .correct { background: #155724; color: #d4edda; }
        .wrong { background: #721c24; color: #f8d7da; }
        footer { margin-top: 40px; color: #333; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>
    <a href="index.html" class="btn-home">მთავარი</a>
    <div class="main-wrapper">
        <div class="sidebar">
            <h3 style="color:#ff4d4d">ლექციები</h3>
            <div id="list-container"></div>
        </div>
        <div class="content-area" id="lecture-content">
            <h2 style="color:#ff4d4d">აირჩიეთ ლექცია</h2>
        </div>
    </div>

    <footer onclick="adminClick()">TimeRiot © 2026</footer>

    <script>
        // СЕКРЕТНЫЕ НАСТРОЙКИ (ЗНАЕШЬ ТОЛЬКО ТЫ)
        const SECRET_SALT = "NAPOLEON"; // Соль для генерации
        const ADMIN_PASS = "1234";    // Пароль, чтобы увидеть текущий код

        const lectures = {
            1: {
                title: "ქვისა და ბრინჯაოს ხანა",
                text: "დმანისში აღმოჩენილი ნაშთები 1.8 მლნ წლით თარიღდება...",
                file: "lecture1.docx",
                isLocked: false,
                questions: [
                    { q: "რამდენი წლისაა დმანისის ნაშთები?", a: ["1.5 მლн", "1.8 მლნ", "2.0 მლნ", "800 ათასი"], correct: 1 }
                ]
            },
            2: {
                title: "შუმერი და ბაბილონი",
                text: "ხამურაბის კანონები შედგება 282 მუხლისგან...",
                file: "lecture2.docx",
                isLocked: true,
                questions: [
                    { q: "რამდენი მუხლია ხამურაბის კანონებში?", a: ["100", "282", "300", "50"], correct: 1 }
                ]
            }
        };

        // ГЕНЕРАТОР ДИНАМИЧЕСКОГО КОДА (меняется каждые 10 минут)
        function getDynamicCode() {
            const now = new Date();
            const timeKey = now.getHours() + "-" + Math.floor(now.getMinutes() / 10);
            const raw = SECRET_SALT + timeKey + now.getDate();
            // Простейший хэш в 5 символов
            let hash = 0;
            for (let i = 0; i < raw.length; i++) {
                hash = ((hash << 5) - hash) + raw.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash).toString(36).substring(0, 5).toUpperCase();
        }

        let clickCount = 0;
        function adminClick() {
            clickCount++;
            if (clickCount === 3) {
                const p = prompt("შეიყვანეთ ადმინის პაროლი:");
                if (p === ADMIN_PASS) {
                    alert("მიმდინარე კოდი მოწაფეებისთვის: " + getDynamicCode());
                }
                clickCount = 0;
            }
        }

        function show(id) {
            const data = lectures[id];
            const content = document.getElementById('lecture-content');
            if (data.isLocked) {
                content.innerHTML = `
                    <div class="lock-screen">
                        <h2 style="color:#ff4d4d">🔒 ლექცია დახურულია</h2>
                        <p>შეიყვანეთ დინამიური კოდი წვდომისთვის:</p>
                        <input type="text" id="pass-input" placeholder="XXXXX">
                        <br>
                        <button onclick="checkKey(${id})">აქტივაცია</button>
                        <p id="lock-error" style="color:red; display:none; margin-top:15px;">კოდი არასწორია ან ვადა გაუვიდა!</p>
                    </div>`;
            } else {
                renderLecture(data, id);
            }
        }

        function checkKey(id) {
            const input = document.getElementById('pass-input').value.toUpperCase();
            if (input === getDynamicCode()) {
                lectures[id].isLocked = false;
                show(id);
            } else {
                document.getElementById('lock-error').style.display = 'block';
            }
        }

        function renderLecture(data, id) {
            let qH = "";
            data.questions.forEach((q, i) => {
                qH += `<p><b>${q.q}</b></p>`;
                q.a.forEach((a, ai) => {
                    qH += `<label class="option-label"><input type="radio" name="q${i}" value="${ai}"> ${a}</label>`;
                });
            });
            document.getElementById('lecture-content').innerHTML = `
                <h2 style="color:#ff4d4d">${data.title}</h2>
                <p>${data.text}</p>
                <a href="./${data.file}" download class="download-btn">📥 ჩამოტვირთე Word</a>
                <div class="test-section">
                    <h3>📝 ტესტი</h3>${qH}
                    <button class="check-btn" onclick="checkTest(${id})">შემოწმება</button>
                    <div id="result-box"></div>
                </div>`;
        }

        function createList() {
            const cont = document.getElementById('list-container');
            cont.innerHTML = "";
            for(let id in lectures) {
                let d = document.createElement('div');
                d.className = 'lecture-link' + (lectures[id].isLocked ? ' locked' : '');
                d.innerText = id + ". " + lectures[id].title;
                d.onclick = () => show(id);
                cont.appendChild(d);
            }
        }

        function checkTest(id) {
            let score = 0;
            const qs = lectures[id].questions;
            qs.forEach((q, i) => {
                const sel = document.querySelector(`input[name="q${i}"]:checked`);
                if(sel && sel.value == q.correct) score++;
            });
            const res = document.getElementById('result-box');
            res.style.display = "block";
            res.innerText = "შედეგი: " + score + " / " + qs.length;
            res.className = (score === qs.length) ? "correct" : "wrong";
        }

        window.onload = createList;
    </script>
</body>
</html>
