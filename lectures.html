<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeRiot | 119 ლექცია & ბლოკნოტი</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+GO:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff4d4d; --bg: #0d0d0d; --card: #1a1a1a; --gold: #ffd700; --text: #ffffff; --accent: #2ecc71; }
        body.soft-mode { --bg: #0a0a09; --card: #141412; --text: #d1cdc0; --red: #ff5e5e; --gold: #ffcc00; }
        
        body { font-family: 'Fira GO', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.3s; }
        
        .master-progress { position: fixed; top: 0; left: 0; width: 100%; height: 6px; background: #222; z-index: 2000; }
        #masterProgressBar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--red), var(--gold)); transition: 1s; box-shadow: 0 0 10px var(--gold); }
        .read-progress { position: fixed; top: 6px; left: 0; width: 0%; height: 2px; background: var(--red); z-index: 1000; }

        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: var(--card); border-bottom: 2px solid #333; margin-top: 6px; }
        .logo { font-size: 24px; font-weight: bold; color: var(--text); text-decoration: none; }
        .logo span { color: var(--red); }
        .rank-badge { background: rgba(255, 215, 0, 0.1); border: 1px solid var(--gold); color: var(--gold); padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        
        .container { display: flex; max-width: 1200px; margin: 30px auto; gap: 30px; padding: 0 20px; flex-wrap: wrap; }
        .sidebar { width: 300px; }
        .sidebar-box { background: var(--card); border: 1px solid #333; padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; }
        
        .search-box { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #444; background: #000; color: white; margin-bottom: 15px; box-sizing: border-box; font-family: 'Fira GO'; }

        .lecture-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 10px; cursor: pointer; transition: 0.3s; position: relative; }
        .lecture-card.completed { border-left: 5px solid var(--accent); }
        .lecture-card.active { border-left: 5px solid var(--red); background: #252525; }
        .lecture-card h4 { margin: 0; font-size: 14px; }

        .main-content { flex: 1; min-width: 300px; background: var(--card); border-radius: 20px; padding: 40px; border: 1px solid #333; position: relative; }

        /* Блокнот */
        .notebook-section { margin-top: 20px; text-align: left; }
        .notebook-item { font-size: 12px; color: var(--gold); margin-bottom: 5px; cursor: pointer; text-decoration: underline; }

        .btn-action { background: none; border: 2px solid var(--red); color: var(--red); padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.3s; font-family: 'Fira GO'; }
        .btn-action:hover { background: var(--red); color: white; }
        .btn-bookmark { border-color: var(--gold); color: var(--gold); margin-bottom: 20px; width: auto; padding: 5px 15px; }

        /* Элементы контента */
        .dig-container { position: relative; width: 100%; height: 300px; margin: 20px 0; border-radius: 15px; overflow: hidden; border: 2px solid #444; }
        .comparison-slider { position: relative; width: 100%; height: 350px; overflow: hidden; border-radius: 15px; border: 2px solid #333; cursor: ew-resize; }
        .img-after { position: absolute; top: 0; left: 0; height: 100%; width: 50%; border-right: 3px solid var(--red); overflow: hidden; z-index: 2; }
    </style>
</head>
<body onscroll="updateReadProgress()" onload="initApp()">

<div class="master-progress"><div id="masterProgressBar"></div></div>
<div class="read-progress" id="progressBar"></div>

<div class="navbar">
    <a href="index.html" class="logo">Time<span>Riot</span></a>
    <div style="display:flex; gap:15px; align-items: center;">
        <div class="rank-badge" id="userRank">რანგი: ნეოფიტი</div>
        <span id="globalStats" style="color:var(--gold); font-size: 13px;">0/119</span>
        <button class="btn-action" onclick="toggleSoftMode()" style="width: auto; margin-top: 0; padding: 5px 10px;">🌙</button>
    </div>
</div>

<div class="container">
    <div class="sidebar">
        <input type="text" id="lectureSearch" class="search-box" placeholder="ძებნა..." oninput="filterLectures()">
        
        <div id="lectureList" style="max-height: 400px; overflow-y: auto;"></div>

        <div class="sidebar-box" style="margin-top: 20px; border-color: var(--gold);">
            <h4 style="color:var(--gold); margin-top:0;">📓 ჩემი ბლოკნოტი</h4>
            <div id="notebookList" class="notebook-section">
                <span style="color:#666; font-size: 11px;">ჯერ არაფერია შენახული...</span>
            </div>
        </div>

        <div class="sidebar-box">
            <button class="btn-action" onclick="dateTrainer()">⚡ ტრენაჟორი</button>
            <button id="music-btn" class="btn-action" onclick="toggleMusic()" style="border-color:#555; color:#555;">🎧 მუსიკა</button>
            <audio id="bg-music" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg"></audio>
        </div>
    </div>

    <div class="main-content">
        <div id="display"></div>
    </div>
</div>

<div class="trainer-overlay" id="tOverlay" onclick="closeTrainer()"></div>
<div class="trainer-modal" id="tModal">
    <h3 id="tDate" style="font-size: 32px; color: #fff;"></h3>
    <p id="tAnswer" style="display:none; color:var(--gold); font-size: 18px; font-weight: bold;"></p>
    <button class="btn-action" id="tBtnShow" onclick="showTrainerAnswer()">ნახვა</button>
    <button class="btn-action" style="border-color:#555;" onclick="closeTrainer()">დახურვა</button>
</div>

<script>
    const data = {
        1: { title: "ქვისა და ბრინჯაოს ხანა", desc: "დმანისის აღმოჩენები", content: "საქართველოს ტერიტორიაზე ადამიანის ცხოვრების კვალი უძველესი დროიდან დასტურდება. დმანისში აღმოჩენილი ჰომინიდები 1.8 მილიონი წლით თარიღდება.", digImage: "https://i.imgur.com/8Y4e3pD.png", dates: ["1.8 მლნ წელი - დმანისი"], test: [{ q: "რამდენი წლისაა დმანისის ნაშთები?", a: ["1.2 მლნ", "1.5 მლნ", "1.8 მლნ"], c: 2 }] },
        2: { title: "შუმერი და ბაბილონი", desc: "მესოპოტამია", content: "მესოპოტამიაში შუმერებმა შექმნეს პირველი ლურსმული დამწერლობა. ბაბილონი გახდა ცენტრი ხამურაბის დროს.", slider: { before: "https://i.imgur.com/xO4X9Q3.jpg", after: "https://i.imgur.com/vHqY7R7.jpg" }, dates: ["ძვ.წ. XVIII ს. - ხამურაბი"], test: [{ q: "რა დამწერლობა შექმნეს შუმერებმა?", a: ["ანბანი", "ლურსმული", "იეროგლიფები"], c: 1 }] }
    };

    let userProgress = JSON.parse(localStorage.getItem('timeriot_completed')) || [];
    let bookmarks = JSON.parse(localStorage.getItem('timeriot_bookmarks')) || [];
    let currentId = 1;

    function initApp() { renderSidebar(); renderNotebook(); loadLecture(1); updateMasterProgress(); }

    function renderSidebar() {
        const list = document.getElementById('lectureList');
        list.innerHTML = '';
        for (let i = 1; i <= 119; i++) {
            const lecture = data[i] || { title: `ლექცია ${i}`, desc: "მალე..." };
            list.innerHTML += `<div class="lecture-card ${i == currentId ? 'active' : ''} ${userProgress.includes(i) ? 'completed' : ''}" data-title="${lecture.title.toLowerCase()}" onclick="loadLecture(${i})"><h4>${i}. ${lecture.title}</h4></div>`;
        }
    }

    function loadLecture(id) {
        currentId = id;
        const l = data[id];
        const display = document.getElementById('display');
        if (!l) {
            display.innerHTML = `<h1>ლექცია ${id}</h1><p>მასალა მზადდება...</p>`;
        } else {
            let html = `<button class="btn-action btn-bookmark" onclick="toggleBookmark(${id})">${bookmarks.includes(id) ? '🔖 შენახულია' : '📌 ბლოკნოტში დამატება'}</button>`;
            html += `<h1>${l.title}</h1><p>${l.content}</p>`;
            if (l.digImage) html += `<div class="dig-container" id="digZone"><img src="${l.digImage}" style="width:100%"><canvas id="digCanvas" style="position:absolute;top:0;left:0;"></canvas></div>`;
            if (l.slider) html += `<div class="comparison-slider" onmousemove="moveSlider(event)"><img src="${l.slider.before}"><div class="img-after"><img src="${l.slider.after}"></div></div>`;
            html += `<div class="test-box"><h3>📝 ტესტი</h3>${l.test.map((t, i) => `<p>${t.q}</p>${t.a.map((ans, ai) => `<label><input type="radio" name="q${i}" value="${ai}"> ${ans}</label><br>`).join('')}`).join('')}<button class="btn-action" onclick="checkTest(${id})">შემოწმება</button></div>`;
            display.innerHTML = html;
            if (l.digImage) initScratch();
        }
        renderSidebar();
    }

    function toggleBookmark(id) {
        if (bookmarks.includes(id)) bookmarks = bookmarks.filter(b => b !== id);
        else bookmarks.push(id);
        localStorage.setItem('timeriot_bookmarks', JSON.stringify(bookmarks));
        renderNotebook();
        loadLecture(id);
    }

    function renderNotebook() {
        const list = document.getElementById('notebookList');
        if (bookmarks.length === 0) { list.innerHTML = '<span style="color:#666; font-size: 11px;">ცარიელია...</span>'; return; }
        list.innerHTML = bookmarks.map(id => `<div class="notebook-item" onclick="loadLecture(${id})">#${id} ${data[id].title}</div>`).join('');
    }

    function updateMasterProgress() {
        const count = userProgress.length;
        const percent = (count / 119) * 100;
        document.getElementById('masterProgressBar').style.width = percent + '%';
        document.getElementById('globalStats').innerText = `${count}/119`;
        
        let rank = "ნეოფიტი";
        if (count > 5) rank = "მკვლევარი";
        if (count > 20) rank = "არქეოლოგი";
        if (count > 50) rank = "ისტორიკოსი";
        if (count > 100) rank = "დროის მაგისტრი";
        document.getElementById('userRank').innerText = `რანგი: ${rank}`;
    }

    function checkTest(id) {
        const l = data[id];
        let correct = true;
        l.test.forEach((t, i) => {
            const sel = document.querySelector(`input[name="q${i}"]:checked`);
            if (!sel || parseInt(sel.value) !== t.c) correct = false;
        });
        if (correct) {
            if (!userProgress.includes(id)) { userProgress.push(id); localStorage.setItem('timeriot_completed', JSON.stringify(userProgress)); }
            updateMasterProgress(); renderSidebar(); alert('სწორია!');
        } else alert('სცადე თავიდან');
    }

    function filterLectures() {
        const query = document.getElementById('lectureSearch').value.toLowerCase();
        document.querySelectorAll('.lecture-card').forEach(card => {
            card.style.display = card.getAttribute('data-title').includes(query) ? 'block' : 'none';
        });
    }

    function toggleSoftMode() { document.body.classList.toggle('soft-mode'); }
    function updateReadProgress() {
        const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
        const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        document.getElementById("progressBar").style.width = (winScroll / height) * 100 + "%";
    }
    function dateTrainer() {
        const all = Object.values(data).flatMap(l => l.dates);
        const random = all[Math.floor(Math.random() * all.length)].split(' - ');
        document.getElementById('tDate').innerText = random[0];
        document.getElementById('tAnswer').innerText = random[1];
        document.getElementById('tAnswer').style.display = 'none';
        document.getElementById('tModal').style.display = 'block';
        document.getElementById('tOverlay').style.display = 'block';
    }
    function showTrainerAnswer() { document.getElementById('tAnswer').style.display = 'block'; }
    function closeTrainer() { document.getElementById('tModal').style.display = 'none'; document.getElementById('tOverlay').style.display = 'none'; }
    function moveSlider(e) {
        const slider = e.currentTarget; const after = slider.querySelector('.img-after');
        const rect = slider.getBoundingClientRect(); let x = e.pageX - rect.left;
        after.style.width = Math.min(Math.max(x, 0), rect.width) + "px";
    }
    function toggleMusic() { 
        const m = document.getElementById('bg-music');
        if (m.paused) { m.play(); document.getElementById('music-btn').innerText = "გამორთვა"; } 
        else { m.pause(); document.getElementById('music-btn').innerText = "🎧 მუსიკა"; }
    }
    function initScratch() {
        const canvas = document.getElementById('digCanvas'); const ctx = canvas.getContext('2d'); const zone = document.getElementById('digZone');
        canvas.width = zone.offsetWidth; canvas.height = zone.offsetHeight;
        ctx.fillStyle = "#5c4033"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.globalCompositeOperation = 'destination-out';
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect(); ctx.beginPath(); ctx.arc(e.clientX - rect.left, e.clientY - rect.top, 30, 0, Math.PI * 2); ctx.fill();
        });
    }
</script>
</body>
</html>
