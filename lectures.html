<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeRiot | Education Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+GO:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff4d4d; --bg: #0d0d0d; --card: #1a1a1a; --gold: #ffd700; --text: #ffffff; }
        body.soft-mode { --bg: #121210; --card: #1c1c18; --text: #e0dcd0; --red: #e65c5c; }
        body { font-family: 'Fira GO', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.3s; }
        
        .master-progress { position: fixed; top: 0; left: 0; width: 100%; height: 6px; background: #222; z-index: 2000; }
        #masterProgressBar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--red), var(--gold)); transition: 1s; box-shadow: 0 0 10px var(--gold); }

        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: var(--card); border-bottom: 2px solid #333; margin-top: 6px; }
        .logo { font-size: 24px; font-weight: bold; color: var(--text); text-decoration: none; }
        .logo span { color: var(--red); }
        
        .container { display: flex; max-width: 1200px; margin: 30px auto; gap: 30px; padding: 0 20px; flex-wrap: wrap; }
        .sidebar { width: 300px; }
        .sidebar-box { background: var(--card); border: 1px solid #333; padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; }
        .btn-action { background: none; border: 2px solid var(--red); color: var(--red); padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.3s; font-family: 'Fira GO'; }
        .btn-action:hover { background: var(--red); color: white; }

        .lecture-card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 15px; cursor: pointer; transition: 0.3s; position: relative; }
        .lecture-card.completed { border-left: 5px solid #2ecc71; }
        .lecture-card.active { border-left: 5px solid var(--red); background: #252525; }

        .main-content { flex: 1; min-width: 300px; background: var(--card); border-radius: 20px; padding: 40px; border: 1px solid #333; position: relative; }

        /* Плюшка: Живой конспект */
        .fact-chip { display: inline-block; background: rgba(255, 215, 0, 0.1); border: 1px solid var(--gold); color: var(--gold); padding: 5px 15px; border-radius: 15px; margin: 5px; font-size: 13px; transition: 0.3s; cursor: default; }
        .fact-chip:hover { background: var(--gold); color: #000; transform: scale(1.05); }

        .map-container { background: #222; border: 1px solid #444; border-radius: 15px; height: 250px; margin: 25px 0; position: relative; overflow: hidden; }
        .map-marker { position: absolute; width: 14px; height: 14px; background: var(--red); border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); cursor: pointer; }
        .dig-container { position: relative; width: 100%; height: 300px; margin: 20px 0; border-radius: 15px; overflow: hidden; border: 2px solid #444; background: #000; }
        .comparison-slider { position: relative; width: 100%; height: 350px; overflow: hidden; border-radius: 15px; margin: 20px 0; border: 2px solid #333; cursor: ew-resize; }
        .img-after { position: absolute; top: 0; left: 0; height: 100%; width: 50%; border-right: 3px solid var(--red); overflow: hidden; z-index: 2; }
        .img-after img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        .btn-next-step { background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; margin-top: 20px; cursor: pointer; display: none; }
        .test-box { margin-top: 40px; padding: 30px; background: #111; border-radius: 15px; border-top: 3px solid var(--red); }
    </style>
</head>
<body onload="initApp()">

<div class="master-progress"><div id="masterProgressBar"></div></div>

<div class="navbar">
    <a href="index.html" class="logo">Time<span>Riot</span></a>
    <div style="display:flex; gap:10px;">
        <span id="globalStats" style="color:var(--gold); font-size: 14px; align-self:center;">პროგრესი: 0/117</span>
        <button class="btn-action" onclick="toggleSoftMode()" style="width: auto; margin-top: 0; padding: 5px 15px;">🌙</button>
    </div>
</div>

<div class="container">
    <div class="sidebar">
        <div class="sidebar-box">
            <span style="font-size: 12px; color: #888;">🎧 ფონი</span>
            <button id="music-btn" class="btn-action" onclick="toggleMusic()">ჩართვა</button>
            <audio id="bg-music" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg"></audio>
        </div>
        <div id="lectureList"></div>
    </div>
    <div class="main-content">
        <div id="display"></div>
    </div>
</div>

<script>
    const data = {
        1: {
            title: "ქვისა და ბრინჯაოს ხანა",
            content: "საქართველოს ტერიტორიაზე ადამიანის ცხოვრების კვალი უძველესი დროიდან დასტურდება. დმანისში აღმოჩენილი ჰომინიდების ნაშთები 1.8 მილიონი წლით თარიღდება.",
            chips: ["1.8 მლნ წელი", "ზეზვა და მზია", "დმანისი", "პირველი ევროპელები"],
            digImage: "https://i.imgur.com/8Y4e3pD.png",
            mapPoints: [{ x: '55%', y: '45%', title: 'დმანისი' }],
            test: [{ q: "რამდენი წლისაა დმანისის ნაშთები?", a: ["1.2 მლნ", "1.5 მლნ", "1.8 მლნ"], c: 2 }]
        },
        2: {
            title: "შუმერი და ბაბილონი",
            content: "მესოპოტამიაში შუმერებმა შექმნეს პირველი ლურსმული დამწერლობა. ბაბილონი გახდა უმნიშვნელოვანესი ცენტრი ხამურაბის დროს.",
            chips: ["ძვ.წ. IV ათასწ.", "ლურსმული დამწერლობა", "ხამურაბის კანონები"],
            slider: { before: "https://i.imgur.com/xO4X9Q3.jpg", after: "https://i.imgur.com/vHqY7R7.jpg" },
            mapPoints: [{ x: '60%', y: '70%', title: 'ბაბილონი' }],
            test: [{ q: "რა ეწოდება შუმერულ დამწერლობას?", a: ["იეროგლიფები", "ანბანი", "ლურსმული"], c: 2 }]
        }
    };

    let userProgress = JSON.parse(localStorage.getItem('timeriot_completed')) || [];
    let currentId = 1;

    function initApp() { renderSidebar(); loadLecture(1); updateMasterProgress(); }

    function renderSidebar() {
        const list = document.getElementById('lectureList');
        list.innerHTML = '';
        Object.keys(data).forEach(id => {
            const isCompleted = userProgress.includes(parseInt(id));
            list.innerHTML += `<div class="lecture-card ${id == currentId ? 'active' : ''} ${isCompleted ? 'completed' : ''}" onclick="loadLecture(${id})"><h4>${id}. ${data[id].title}</h4></div>`;
        });
    }

    function loadLecture(id) {
        currentId = id;
        const l = data[id];
        const display = document.getElementById('display');
        let html = `<h1>${l.title}</h1>`;
        
        // Рендер чипсов (плюшка)
        html += `<div style="margin-bottom: 20px;">${l.chips.map(c => `<span class="fact-chip">${c}</span>`).join('')}</div>`;
        
        html += `<p>${l.content}</p>`;
        if (l.digImage) html += `<div class="dig-container" id="digZone"><img src="${l.digImage}" style="width:100%"><canvas id="digCanvas" style="position:absolute;top:0;left:0;"></canvas></div>`;
        if (l.slider) html += `<div class="comparison-slider" onmousemove="moveSlider(event)"><img src="${l.slider.before}"><div class="img-after"><img src="${l.slider.after}"></div></div>`;
        
        html += `<div class="test-box"><h3>📝 ტესტი</h3>${l.test.map((t, i) => `<p>${t.q}</p>${t.a.map((ans, ai) => `<label><input type="radio" name="q${i}" value="${ai}"> ${ans}</label><br>`).join('')}`).join('')}<button class="btn-action" onclick="checkTest(${id})">შემოწმება</button></div>`;
        html += `<button id="nextBtn" class="btn-next-step" style="display:none;" onclick="loadLecture(${id + 1})">შემდეგი ლექცია 🔓</button>`;
        
        display.innerHTML = html;
        renderSidebar();
        if (l.digImage) initScratch();
    }

    function checkTest(id) {
        const l = data[id];
        let correct = true;
        l.test.forEach((t, i) => {
            const sel = document.querySelector(`input[name="q${i}"]:checked`);
            if (!sel || parseInt(sel.value) !== t.c) correct = false;
        });

        if (correct) {
            if (!userProgress.includes(id)) { userProgress.push(id); localStorage.setItem('timeriot_completed', JSON.stringify(userProgress)); }
            updateMasterProgress(); renderSidebar();
            document.getElementById('nextBtn').style.display = 'block';
            alert('სწორია!');
        } else { alert('სცადე თავიდან'); }
    }

    function updateMasterProgress() {
        const percent = (userProgress.length / 117) * 100;
        document.getElementById('masterProgressBar').style.width = percent + '%';
        document.getElementById('globalStats').innerText = `პროგრესი: ${userProgress.length}/117`;
    }

    function moveSlider(e) {
        const slider = e.currentTarget; const after = slider.querySelector('.img-after');
        const rect = slider.getBoundingClientRect(); let x = e.pageX - rect.left;
        if (x < 0) x = 0; if (x > rect.width) x = rect.width;
        after.style.width = x + "px";
    }

    function toggleMusic() { 
        const m = document.getElementById('bg-music'); const b = document.getElementById('music-btn');
        if (m.paused) { m.play(); b.innerText = "გამორთვა"; } else { m.pause(); b.innerText = "ჩართვა"; }
    }
    function toggleSoftMode() { document.body.classList.toggle('soft-mode'); }

    function initScratch() {
        const canvas = document.getElementById('digCanvas'); const ctx = canvas.getContext('2d'); const zone = document.getElementById('digZone');
        if(!canvas) return;
        canvas.width = zone.offsetWidth; canvas.height = zone.offsetHeight;
        ctx.fillStyle = "#5c4033"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.globalCompositeOperation = 'destination-out';
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect(); ctx.beginPath(); ctx.arc(e.clientX - rect.left, e.clientY - rect.top, 30, 0, Math.PI * 2); ctx.fill();
        });
    }
</script>
</body>
</html>
