<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>TimeRiot | ლექციები</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+GO:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Fira GO', sans-serif; background: #0d0d0d; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .main-wrapper { display: flex; width: 100%; max-width: 1100px; gap: 20px; }
        .sidebar { width: 300px; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .lecture-link { display: block; padding: 15px; margin-bottom: 10px; background: #262626; border-radius: 8px; cursor: pointer; position: relative; }
        .lecture-link.locked::after { content: '🔒'; position: absolute; right: 15px; }
        .lecture-link.active { background: #ff4d4d; }
        .content-area { flex: 1; background: #1a1a1a; padding: 35px; border-radius: 15px; border: 1px solid #333; min-height: 500px; }
        .lock-screen { text-align: center; padding: 60px 20px; }
        .lock-screen input { padding: 12px; border-radius: 8px; border: 1px solid #ff4d4d; background: #000; color: white; text-align: center; font-size: 20px; }
        .lock-screen button { padding: 12px 30px; background: #ff4d4d; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 15px; }
        .download-btn { display: inline-block; color: #ff4d4d; border: 2px solid #ff4d4d; padding: 10px 20px; text-decoration: none; border-radius: 8px; margin: 20px 0; }
        .option-label { display: block; padding: 10px; background: #262626; border-radius: 5px; margin-bottom: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <a href="index.html" style="color: white; margin-bottom: 20px; text-decoration: none;">← მთავარი</a>
    <div class="main-wrapper">
        <div class="sidebar"><h3>ლექციები</h3><div id="list-container"></div></div>
        <div class="content-area" id="lecture-content"><h2>აირჩიეთ ლექცია</h2></div>
    </div>

    <script>
        const SECRET_SALT = "NAPOLEON";
        const lectures = {
            1: { title: "ქვისა და ბრინჯაოს ხანა", text: "დმანისი 1.8 მლნ წელი...", file: "lecture1.docx", isLocked: false, questions: [{q: "დმანისი?", a: ["1.5","1.8","2.0","0.8"], correct: 1}] },
            2: { title: "შუმერი და ბაბილონი", text: "ხამურაბი 282 მუხლი...", file: "lecture2.docx", isLocked: true, questions: [{q: "მუხლები?", a: ["100","282","300","50"], correct: 1}] }
        };

        function getDynamicCode() {
            const now = new Date();
            const timeKey = now.getHours() + "-" + Math.floor(now.getMinutes() / 10);
            const dateKey = now.getDate() + "-" + (now.getMonth() + 1);
            const raw = SECRET_SALT + timeKey + dateKey;
            let hash = 0;
            for (let i = 0; i < raw.length; i++) { hash = ((hash << 5) - hash) + raw.charCodeAt(i); hash |= 0; }
            return Math.abs(hash).toString(36).substring(0, 5).toUpperCase();
        }

        function show(id) {
            const data = lectures[id];
            const content = document.getElementById('lecture-content');
            if (data.isLocked) {
                content.innerHTML = `<div class="lock-screen"><h2>🔒 ლექცია დახურულია</h2><p>შეიყვანეთ კოდი:</p><input type="text" id="pass-input"><br><button onclick="checkKey(${id})">გახსნა</button></div>`;
            } else { renderLecture(data, id); }
        }

        function checkKey(id) {
            if (document.getElementById('pass-input').value.toUpperCase() === getDynamicCode()) {
                lectures[id].isLocked = false; show(id);
            } else { alert("არასწორი კოდი!"); }
        }

        function renderLecture(data, id) {
            let qH = "";
            data.questions.forEach((q, i) => {
                qH += `<p><b>${q.q}</b></p>`;
                q.a.forEach((a, ai) => { qH += `<label class="option-label"><input type="radio" name="q${i}" value="${ai}"> ${a}</label>`; });
            });
            document.getElementById('lecture-content').innerHTML = `<h2>${data.title}</h2><p>${data.text}</p><a href="./${data.file}" download class="download-btn">📥 ჩამოტვირთე Word</a><div>${qH}</div>`;
        }

        function createList() {
            const cont = document.getElementById('list-container');
            cont.innerHTML = "";
            for(let id in lectures) {
                let d = document.createElement('div');
                d.className = 'lecture-link' + (lectures[id].isLocked ? ' locked' : '');
                d.innerText = id + ". " + lectures[id].title;
                d.onclick = () => show(id);
                cont.appendChild(d);
            }
        }
        window.onload = createList;
    </script>
</body>
</html>
