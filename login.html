<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>TimeRiot | შესვლა</title>
    <style>
        body { font-family: sans-serif; background: #0d0d0d; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: #1a1a1a; padding: 40px; border-radius: 20px; border: 1px solid #ff4d4d; text-align: center; width: 300px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #ff4d4d; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        #error-msg { color: #ff4d4d; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <h2 style="color:#ff4d4d">TimeRiot</h2>
    <p>ავტორიზაცია</p>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="signIn()">შესვლა</button>
    <div id="error-msg">არასწორი მონაცემები!</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAeGrfQ8OKbgs74zFEt2nVcM3IL2qGCIyA",
        authDomain: "timeriot.firebaseapp.com",
        projectId: "timeriot",
        storageBucket: "timeriot.firebasestorage.app",
        messagingSenderId: "720198588868",
        appId: "1:720198588868:web:cb92029bc431384c85ac91"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.signIn = async function() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const error = document.getElementById('error-msg');

        try {
            await signInWithEmailAndPassword(auth, email, pass);
            // Если вошел успешно — сохраняем статус и идем на лекции
            localStorage.setItem('userLoggedIn', 'true');
            window.location.href = "lectures.html";
        } catch (e) {
            error.style.display = "block";
            console.error(e);
        }
    }
</script>
</body>
</html>
